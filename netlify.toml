[build]
command = "npm run build"
publish = "dist"

[dev]
command = "npm run dev"

[[plugins]]
package = "netlify-plugin-cache-folder"

[[plugins]]
package = "@netlify/plugin-lighthouse"

[[redirects]]
from = "https://navillus.nl"
to = "https://navillus.dev"
status = 301
force = true

[[redirects]]
from = "https://navillus.nl/"
to = "https://navillus.dev/"
status = 301
force = true

[[redirects]]
from = "https://navillus.nl/*"
to = "https://navillus.dev/:splat"
status = 301
force = true

# Retired blog posts — redirect to the blog index.
[[redirects]]
from = "/blog/astro-plus-netlify-cms"
to = "/blog"
status = 301

